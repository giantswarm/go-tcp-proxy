version: 2.1

orbs:
  architect: giantswarm/architect@9.2.0

workflows:
  build:
    jobs:
      - architect/go-build:
          name: go-build
          context: architect
          binary: go-tcp-proxy
          filters:
            tags:
              only: /^v.*/

      - architect/push-to-registries:
          context: architect
          name: push-to-registries
          requires:
          - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
              - main
              - master
